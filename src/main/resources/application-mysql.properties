# Done:
# file config dành riêng cho môi trường dùng MySQL
# Để load cấu hình của file này, thì có nhiều cách. Cách đơn giản nhất là khai báo
# spring.profiles.active=mysql trong file application.properties
# database init, supports mysql too


database=mysql
# Nếu có biến môi trường MYSQL_URL → dùng nó
# Nếu không có → dùng default: jdbc:mysql://localhost/petclinic
# Thuong khai báo ở file:
# spring-petclinic\src\main\resources\application.properties
# Db name là petclinic

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/petclinic}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASS:}
# SQL is written to be idempotent so this is safe
spring.sql.init.mode=always
