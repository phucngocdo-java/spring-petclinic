# Done
# File cấu hình spring boot đọc trước khi ứng dụng chạy
# database init, supports mysql too
# database nằm trong ram, khi app tat, mất toàn bộ dữ liệu
# Ở project này ngoài h2, con có thể dùng mysql. Có thể dùng Laragon để bật mysql và kết nối.
database=h2
# 2 dòng sau bật cấu hình h2-console để xem db
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Product thật sẽ dùng Flyway và Liquibase để tạo và insert dữ liệu
# Tạo bảng
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
# Insert dữ liệu
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
# Mặc định là HTML và HTML la phổ biến nhất
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JDBC tích hợp sẵn trong java
# JDBC dùng SQL trực tiếp
# Hibernate là thư viện ngoài khai báo trong pom.xml gọi đến JDBC để connect với DB
# Hibernate Là ORM (Object–Relational Mapping)
# JPA
# Hibernate không tự tạo, sửa hay xoá bảng trong database, mặc định là none
# Ngoài ra còn có update, create, create-drop
spring.jpa.hibernate.ddl-auto=none
# Nên để là false
# Không cho phép Hibernate truy vấn database trong lúc đang render giao diện (View như Thymeleaf)
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Internationalization
# Tìm các file .properties phục vụ translate (i18n)
spring.messages.basename=messages/messages

# Actuator
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h
